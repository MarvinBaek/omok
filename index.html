<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>스트리머 오목 - 시청자 투표 대전</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #1a1a1a;
    color: #f0f0f0;
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 12px; }
  .panel {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  .panel-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  button {
    background: #444;
    color: #f0f0f0;
    border: 1px solid #555;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover { background: #555; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #c84a3a; border-color: #c84a3a; }
  button.primary:hover { background: #d85a4a; }
  input[type="text"] {
    background: #1a1a1a;
    color: #f0f0f0;
    border: 1px solid #555;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
  }
  code {
    background: #1a1a1a;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    word-break: break-all;
  }
  canvas {
    width: 100%;
    height: auto;
    background: #E8C896;
    border-radius: 8px;
    cursor: pointer;
    display: block;
  }
  .muted { color: #999; font-size: 13px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .row > * { flex: 1; min-width: 80px; }
  details summary { cursor: pointer; font-weight: 500; font-size: 14px; padding: 4px 0; }
  details > div { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  label { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  input[type="range"] { flex: 1; }
  .hidden { display: none !important; }
  #status { font-size: 14px; }
  #result-msg { text-align: center; min-height: 20px; color: #ffd54f; font-size: 13px; margin-top: 8px; }

  /* 승리 통계 */
  .score-box { display: flex; justify-content: space-around; padding: 4px 0; }
  .score-item { text-align: center; }
  .score-item .label { font-size: 12px; color: #999; }
  .score-item .num { font-size: 24px; font-weight: bold; color: #ffd54f; }

  /* 승리 모달 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }
  .modal-overlay.hidden { display: none; }
  .modal-content {
    background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
    border: 2px solid #ffd54f;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 90%;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255, 213, 79, 0.3);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-trophy {
    font-size: 72px;
    margin-bottom: 8px;
    animation: bounce 1s ease infinite;
  }
  .modal-title {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(90deg, #ffd54f, #ff9800, #ffd54f);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 2s linear infinite;
    margin: 8px 0;
  }
  .modal-subtitle {
    font-size: 16px;
    color: #ccc;
    margin-bottom: 20px;
  }
  .modal-stats {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 8px;
    padding: 12px;
    margin: 16px 0;
    font-size: 14px;
    color: #aaa;
  }
  .modal-buttons {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .modal-buttons button {
    flex: 1;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
  }
  .btn-big-primary {
    background: linear-gradient(135deg, #c84a3a, #ff6347);
    border: none;
    color: white;
  }
  .btn-big-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(200, 74, 58, 0.4); }
  .btn-big-secondary {
    background: #333;
    border: 1px solid #555;
  }

  /* 컨페티 */
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall linear forwards;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  @keyframes shine {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 스트리머 오목 — 시청자 투표 대전</h1>

  <!-- 로비 -->
  <div id="lobby" class="panel">
    <p class="muted" id="lobby-status">Firebase 연결 중...</p>
    <div class="row">
      <button id="btn-host" class="primary" disabled>방 만들기 (호스트)</button>
      <button id="btn-join-toggle" disabled>방 참여 (시청자)</button>
    </div>
    <div id="host-pwd-area" class="hidden" style="margin-top: 12px;">
      <p class="muted" style="margin: 0 0 6px;">🔒 호스트 비밀번호 입력:</p>
      <input id="pwd-input" type="password" placeholder="비밀번호" autocomplete="off" />
      <div style="height: 8px"></div>
      <div style="display: flex; gap: 8px;">
        <button id="btn-pwd-cancel" style="flex: 1;">취소</button>
        <button id="btn-pwd-submit" class="primary" style="flex: 2;">방 만들기</button>
      </div>
      <p id="pwd-error" style="color: #ff6b6b; font-size: 12px; margin: 8px 0 0; min-height: 16px;"></p>
    </div>
    <div id="join-area" class="hidden">
      <input id="room-input" type="text" placeholder="방 ID 입력 (예: abc123)" />
      <div style="height: 8px"></div>
      <button id="btn-join" style="width: 100%">접속</button>
    </div>
  </div>

  <!-- 게임 영역 -->
  <div id="game-area" class="hidden">
    <details class="panel" id="settings-panel">
      <summary>⚙️ 설정 (호스트 전용)</summary>
      <div>
        <label>
          <span style="min-width: 80px;">투표 시간</span>
          <input id="time-slider" type="range" min="5" max="60" value="20" />
          <span id="time-val" style="min-width: 40px; text-align: right;">20초</span>
        </label>
        <label>
          <input id="rule-toggle" type="checkbox" />
          <span>금수 룰 (3-3, 4-4, 장목 금지)</span>
        </label>
        <button id="btn-reset" style="margin-top: 4px;">새 게임 시작</button>
      </div>
    </details>

    <!-- 점수판 -->
    <div class="panel">
      <div class="score-box">
        <div class="score-item">
          <div class="label">👑 호스트</div>
          <div class="num" id="score-host">0</div>
        </div>
        <div class="score-item" style="align-self: center; font-size: 16px; color: #666;">VS</div>
        <div class="score-item">
          <div class="label">👥 시청자</div>
          <div class="num" id="score-viewer">0</div>
        </div>
      </div>
    </div>

    <div class="panel panel-row">
      <span id="role-label" style="font-weight: 500;"></span>
      <span id="status">대기 중</span>
    </div>

    <!-- 호스트용 방 ID 표시 (게임 화면 안) -->
    <div id="room-id-display" class="panel hidden" style="background: #3a2a1a; border: 1px solid #c84a3a;">
      <p class="muted" style="margin: 0 0 6px; color: #ffb;">📢 시청자에게 공유할 방 ID:</p>
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
        <code id="my-room-id" style="flex: 1; font-size: 18px; font-weight: bold; color: #ffd54f;"></code>
        <button id="btn-copy" style="padding: 6px 12px; font-size: 12px;">ID 복사</button>
      </div>
      <p class="muted" style="margin: 0; font-size: 12px;">또는 링크 공유:</p>
      <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
        <code id="share-link" style="flex: 1; font-size: 11px;"></code>
        <button id="btn-copy-link" style="padding: 6px 12px; font-size: 12px;">링크 복사</button>
      </div>
      <p class="muted" style="margin: 8px 0 0; font-size: 11px; color: #ff9800;">⚠️ 이 탭을 닫거나 새로고침하면 방이 즉시 삭제됩니다</p>
    </div>

    <canvas id="board" width="600" height="600"></canvas>

    <div class="panel" id="info-panel" style="margin-top: 8px;">
      <div class="panel-row">
        <span class="muted">접속자: <span id="viewer-count">0</span>명</span>
        <span class="muted" id="my-vote-info"></span>
      </div>
    </div>
    <p id="result-msg"></p>
  </div>
</div>

<!-- 승리 모달 -->
<div id="win-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-trophy" id="modal-trophy">🏆</div>
    <div class="modal-title" id="modal-title">호스트 승리!</div>
    <div class="modal-subtitle" id="modal-subtitle">5목 완성!</div>
    <div class="modal-stats" id="modal-stats">
      이번 시즌: 호스트 0승 — 시청자 0승
    </div>
    <div class="modal-buttons" id="modal-buttons-host">
      <button class="btn-big-secondary" id="btn-modal-close">결과 보기</button>
      <button class="btn-big-primary" id="btn-modal-newgame">🔄 새 게임</button>
    </div>
    <div class="modal-buttons" id="modal-buttons-viewer" style="display:none;">
      <button class="btn-big-secondary" id="btn-modal-close-v" style="width: 100%;">닫기 (호스트가 새 게임 시작 대기)</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat 버전 - 간단하게 쓰기 좋음) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// ===== Firebase 설정 (사용자의 키) =====
const firebaseConfig = {
  apiKey: "AIzaSyCl1KMqk_FCWjld_Q1e5zRmaTeNg7Wezms",
  authDomain: "omok-stream.firebaseapp.com",
  databaseURL: "https://omok-stream-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "omok-stream",
  storageBucket: "omok-stream.firebasestorage.app",
  messagingSenderId: "472668336748",
  appId: "1:472668336748:web:85a40f7226f93db541de49"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== 게임 상수 =====
const SIZE = 15;
const CELL = 600 / (SIZE + 1);
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// ===== 상태 =====
let roomId = null;
let isHost = false;
let myViewerId = 'v_' + Math.random().toString(36).slice(2, 8);
let roomRef = null;
let board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
let turn = 1;
let gameOver = false;
let votes = {};
let voteTime = 20;
let renjuRule = false;
let voteDeadline = null;
let localTimer = null;
let forbiddenSpots = [];
let presenceRef = null;
let viewerCount = 0;
let winLine = []; // 승리한 5목 좌표 [[x,y], ...]
let scoreHost = 0;
let scoreViewer = 0;

// ===== Firebase 연결 확인 =====
db.ref('.info/connected').on('value', (snap) => {
  const connected = snap.val();
  const lobbyStatus = document.getElementById('lobby-status');
  if (connected) {
    lobbyStatus.textContent = '✅ Firebase 연결됨 — 방을 만들거나 입장하세요';
    document.getElementById('btn-host').disabled = false;
    document.getElementById('btn-join-toggle').disabled = false;
  } else {
    lobbyStatus.textContent = '⏳ Firebase 연결 중...';
  }
});

// ===== UI 핸들러 =====
document.getElementById('btn-host').addEventListener('click', () => {
  // 비밀번호 입력 영역 표시
  document.getElementById('host-pwd-area').classList.remove('hidden');
  document.getElementById('join-area').classList.add('hidden');
  document.getElementById('pwd-input').focus();
});
document.getElementById('btn-pwd-cancel').addEventListener('click', () => {
  document.getElementById('host-pwd-area').classList.add('hidden');
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').textContent = '';
});
document.getElementById('btn-pwd-submit').addEventListener('click', tryCreateRoom);
document.getElementById('pwd-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryCreateRoom();
});
document.getElementById('btn-join-toggle').addEventListener('click', () => {
  document.getElementById('join-area').classList.toggle('hidden');
});
document.getElementById('btn-join').addEventListener('click', () => {
  const id = document.getElementById('room-input').value.trim().toLowerCase();
  if (id) joinRoom(id);
});
document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(roomId);
  const b = document.getElementById('btn-copy');
  b.textContent = '복사됨!';
  setTimeout(() => b.textContent = 'ID 복사', 1500);
});
document.getElementById('btn-copy-link').addEventListener('click', () => {
  const link = window.location.origin + window.location.pathname + '?room=' + roomId;
  navigator.clipboard.writeText(link);
  const b = document.getElementById('btn-copy-link');
  b.textContent = '복사됨!';
  setTimeout(() => b.textContent = '링크 복사', 1500);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!isHost) return;
  resetGame();
});
document.getElementById('time-slider').addEventListener('input', (e) => {
  voteTime = parseInt(e.target.value);
  document.getElementById('time-val').textContent = voteTime + '초';
  if (isHost) roomRef.child('meta/voteTime').set(voteTime);
});
document.getElementById('rule-toggle').addEventListener('change', (e) => {
  renjuRule = e.target.checked;
  if (isHost) roomRef.child('meta/renju').set(renjuRule);
  computeForbidden();
  drawBoard();
});

// URL에서 방 ID 자동 인식
const urlParams = new URLSearchParams(window.location.search);
const urlRoom = urlParams.get('room');
if (urlRoom) {
  document.getElementById('btn-join-toggle').addEventListener('click', () => {}, { once: true });
  setTimeout(() => {
    if (!roomId) {
      document.getElementById('room-input').value = urlRoom;
      document.getElementById('join-area').classList.remove('hidden');
    }
  }, 500);
}

// 호스트가 탭 닫으려 할 때 경고
window.addEventListener('beforeunload', (e) => {
  if (isHost && roomRef) {
    e.preventDefault();
    e.returnValue = '방이 삭제됩니다. 정말 나가시겠습니까?';
    return e.returnValue;
  }
});

// ===== 비밀번호 검증 + 방 생성 =====
// SHA-256 해시 (비밀번호: ticktok2026, salt: omok-marvin-2026-salt-xyz)
const HOST_PWD_HASH = 'fb3198e9c360deaadfda946a430eb7eb582bca5c0df8087e3dfe27bbd8ede991';
const PWD_SALT = 'omok-marvin-2026-salt-xyz';

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

let pwdAttempts = 0;
let pwdLockedUntil = 0;

async function tryCreateRoom() {
  // 잠금 확인
  if (Date.now() < pwdLockedUntil) {
    const left = Math.ceil((pwdLockedUntil - Date.now()) / 1000);
    document.getElementById('pwd-error').textContent = `잠금됨. ${left}초 후 다시 시도하세요.`;
    return;
  }
  const pwd = document.getElementById('pwd-input').value;
  if (!pwd) {
    document.getElementById('pwd-error').textContent = '비밀번호를 입력하세요';
    return;
  }
  const hash = await sha256(pwd + PWD_SALT);
  if (hash !== HOST_PWD_HASH) {
    pwdAttempts++;
    if (pwdAttempts >= 5) {
      pwdLockedUntil = Date.now() + 60000; // 1분 잠금
      pwdAttempts = 0;
      document.getElementById('pwd-error').textContent = '5회 실패. 1분간 잠금됩니다.';
    } else {
      document.getElementById('pwd-error').textContent = `비밀번호가 틀렸습니다 (${pwdAttempts}/5)`;
    }
    document.getElementById('pwd-input').value = '';
    return;
  }
  // 성공! 방 생성
  pwdAttempts = 0;
  document.getElementById('pwd-error').textContent = '';
  createRoom(hash);
}

// ===== 방 생성 =====
function createRoom(authHash) {
  roomId = Math.random().toString(36).slice(2, 8);
  isHost = true;
  roomRef = db.ref('rooms/' + roomId);
  console.log('[방 만들기] 시도 - 방 ID:', roomId);
  // 초기 상태 작성 (auth 필드 포함)
  roomRef.set({
    auth: authHash,
    createdAt: firebase.database.ServerValue.TIMESTAMP,
    board: serializeBoard(board),
    turn: 1,
    votes: {},
    meta: {
      voteTime: voteTime,
      renju: renjuRule,
      gameOver: false,
      voteDeadline: 0,
      winner: 0,
      winLine: '[]',
      scoreHost: 0,
      scoreViewer: 0
    }
  }).then(() => {
    console.log('[방 만들기] 성공!');
    enterGame();
  }).catch(err => {
    console.error('[방 만들기] 실패:', err);
    alert('❌ 방 생성 실패\n\n사유: ' + err.message + '\n\n해결방법: Firebase 콘솔에서 Realtime Database → 규칙 탭을 확인하세요.');
  });
}

// ===== 방 입장 =====
function joinRoom(id) {
  roomId = id;
  isHost = false;
  roomRef = db.ref('rooms/' + roomId);
  roomRef.once('value').then(snap => {
    if (!snap.exists()) {
      alert('해당 방이 존재하지 않습니다: ' + id);
      return;
    }
    enterGame();
  });
}

// ===== 게임 화면 진입 =====
function enterGame() {
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('role-label').textContent = isHost ? '👑 호스트 (흑돌)' : '👥 시청자 (백돌 투표)';

  if (isHost) {
    document.getElementById('room-id-display').classList.remove('hidden');
    document.getElementById('my-room-id').textContent = roomId;
    const link = window.location.origin + window.location.pathname + '?room=' + roomId;
    document.getElementById('share-link').textContent = link;
    // 호스트가 나가면 방 자동 삭제 (브라우저/탭 닫힘, 네트워크 끊김 모두 감지)
    roomRef.onDisconnect().remove();
    console.log('[자동삭제] 호스트 연결 끊기면 방 삭제됨');
  } else {
    document.getElementById('settings-panel').classList.add('hidden');
  }

  // Firebase 리스너
  roomRef.on('value', onRoomUpdate);

  // 접속자 카운트 (presence)
  presenceRef = roomRef.child('presence/' + myViewerId);
  presenceRef.set(true);
  presenceRef.onDisconnect().remove();
  roomRef.child('presence').on('value', (snap) => {
    viewerCount = snap.numChildren();
    document.getElementById('viewer-count').textContent = viewerCount;
  });

  drawBoard();
}

// ===== Firebase 상태 변경 수신 =====
function onRoomUpdate(snap) {
  const data = snap.val();
  if (!data) {
    // 방이 삭제됨 (호스트가 나감)
    if (!isHost && roomRef) {
      stopLocalTimer();
      alert('🚪 호스트가 방을 떠났습니다. 방이 종료되었습니다.');
      window.location.href = window.location.origin + window.location.pathname;
    }
    return;
  }
  const wasGameOver = gameOver;
  board = deserializeBoard(data.board);
  turn = data.turn || 1;
  votes = data.votes || {};
  const meta = data.meta || {};
  gameOver = !!meta.gameOver;
  voteTime = meta.voteTime || 20;
  renjuRule = !!meta.renju;
  voteDeadline = meta.voteDeadline || 0;
  winLine = meta.winLine ? JSON.parse(meta.winLine) : [];
  scoreHost = meta.scoreHost || 0;
  scoreViewer = meta.scoreViewer || 0;

  // 점수 UI 업데이트
  document.getElementById('score-host').textContent = scoreHost;
  document.getElementById('score-viewer').textContent = scoreViewer;

  // 호스트 설정 UI 동기화
  if (isHost) {
    document.getElementById('time-slider').value = voteTime;
    document.getElementById('time-val').textContent = voteTime + '초';
    document.getElementById('rule-toggle').checked = renjuRule;
  }

  computeForbidden();
  updateStatus();
  drawBoard();

  // 투표 타이머 (호스트만 결과를 결정)
  if (turn === 2 && !gameOver && voteDeadline > 0) {
    startLocalTimer();
  } else {
    stopLocalTimer();
  }

  // 게임 종료 → 모달 표시 (방금 끝났을 때만)
  if (gameOver && meta.winner && !wasGameOver) {
    showWinModal(meta.winner);
  }
  // 새 게임 시작되면 모달 닫기
  if (!gameOver && wasGameOver) {
    hideWinModal();
  }

  // 게임 종료 표시
  if (gameOver && meta.winner) {
    document.getElementById('status').textContent =
      (meta.winner === 1 ? '👑 호스트 승리!' : '👥 시청자 승리!');
  }
}

// ===== 시청자가 클릭 → 투표 =====
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scale = 600 / rect.width;
  const px = (e.clientX - rect.left) * scale;
  const py = (e.clientY - rect.top) * scale;
  const x = Math.round(px / CELL) - 1;
  const y = Math.round(py / CELL) - 1;
  if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
  if (board[x][y] !== 0) return;

  if (isHost) {
    if (turn !== 1) return;
    if (renjuRule && isForbidden(x, y)) {
      document.getElementById('result-msg').textContent = '⛔ 금수 자리입니다';
      return;
    }
    hostPlaceStone(x, y, 1);
  } else {
    if (turn !== 2) return;
    // 투표
    roomRef.child('votes/' + myViewerId).set(x + ',' + y);
    document.getElementById('my-vote-info').textContent = '내 투표: (' + x + ',' + y + ')';
  }
});

// ===== 호스트: 돌 두기 =====
function hostPlaceStone(x, y, color) {
  board[x][y] = color;
  const winInfo = checkWinWithLine(x, y, color);
  const updates = {
    board: serializeBoard(board),
    turn: color === 1 ? 2 : 1,
    votes: {}
  };
  if (winInfo) {
    updates['meta/gameOver'] = true;
    updates['meta/winner'] = color;
    updates['meta/winLine'] = JSON.stringify(winInfo);
    // 점수 누적
    if (color === 1) updates['meta/scoreHost'] = scoreHost + 1;
    else updates['meta/scoreViewer'] = scoreViewer + 1;
  } else if (updates.turn === 2) {
    // 시청자 투표 시작 → 마감시간 기록
    updates['meta/voteDeadline'] = Date.now() + voteTime * 1000;
  }
  roomRef.update(updates);
}

// ===== 호스트: 투표 결과 처리 =====
function resolveVote() {
  if (!isHost || turn !== 2 || gameOver) return;
  roomRef.child('votes').once('value').then(snap => {
    const v = snap.val() || {};
    const counts = {};
    Object.values(v).forEach(pos => {
      counts[pos] = (counts[pos] || 0) + 1;
    });
    const entries = Object.entries(counts);
    if (entries.length === 0) {
      // 투표 없음 → 차례 넘김
      roomRef.update({
        turn: 1,
        votes: {},
        'meta/voteDeadline': 0
      });
      document.getElementById('result-msg').textContent = '투표 없음 — 호스트 차례로 넘어갑니다';
      return;
    }
    const max = Math.max(...entries.map(e => e[1]));
    const winners = entries.filter(e => e[1] === max);
    const winner = winners[Math.floor(Math.random() * winners.length)];
    const [x, y] = winner[0].split(',').map(Number);
    document.getElementById('result-msg').textContent =
      `(${x},${y})에 ${max}표 — 백돌 착수${winners.length > 1 ? ` (동률 ${winners.length}개 중 랜덤)` : ''}`;
    hostPlaceStone(x, y, 2);
  });
}

// ===== 로컬 타이머 =====
function startLocalTimer() {
  stopLocalTimer();
  localTimer = setInterval(() => {
    const left = Math.max(0, Math.ceil((voteDeadline - Date.now()) / 1000));
    document.getElementById('status').textContent = '👥 시청자 투표 중 — ' + left + '초';
    if (left <= 0) {
      stopLocalTimer();
      if (isHost) resolveVote();
    }
  }, 200);
}
function stopLocalTimer() {
  if (localTimer) { clearInterval(localTimer); localTimer = null; }
}

// ===== 승리 모달 =====
function showWinModal(winner) {
  const modal = document.getElementById('win-modal');
  const trophy = document.getElementById('modal-trophy');
  const title = document.getElementById('modal-title');
  const subtitle = document.getElementById('modal-subtitle');
  const stats = document.getElementById('modal-stats');

  if (winner === 1) {
    trophy.textContent = '👑';
    title.textContent = '호스트 승리!';
    subtitle.textContent = '흑돌이 5목을 완성했습니다';
  } else {
    trophy.textContent = '🎉';
    title.textContent = '시청자 승리!';
    subtitle.textContent = '집단지성으로 5목 완성!';
  }
  stats.innerHTML = `이번 시즌 전적<br><span style="font-size:18px; color:#ffd54f;">👑 호스트 ${scoreHost}승 — 시청자 ${scoreViewer}승 👥</span>`;

  // 호스트/시청자에 따라 버튼 다르게
  document.getElementById('modal-buttons-host').style.display = isHost ? 'flex' : 'none';
  document.getElementById('modal-buttons-viewer').style.display = isHost ? 'none' : 'flex';

  modal.classList.remove('hidden');
  fireConfetti();
}
function hideWinModal() {
  document.getElementById('win-modal').classList.add('hidden');
}
function fireConfetti() {
  const colors = ['#ffd54f', '#ff6347', '#4caf50', '#2196f3', '#e91e63', '#ff9800'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (2 + Math.random() * 2) + 's';
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = c.style.width;
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 30);
  }
}

document.getElementById('btn-modal-close').addEventListener('click', hideWinModal);
document.getElementById('btn-modal-close-v').addEventListener('click', hideWinModal);
document.getElementById('btn-modal-newgame').addEventListener('click', () => {
  hideWinModal();
  resetGame();
});

// ===== 새 게임 =====
function resetGame() {
  board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
  roomRef.update({
    board: serializeBoard(board),
    turn: 1,
    votes: {},
    'meta/gameOver': false,
    'meta/winner': 0,
    'meta/voteDeadline': 0,
    'meta/winLine': '[]'
  });
  document.getElementById('result-msg').textContent = '🎮 새 게임 시작!';
  hideWinModal();
}

// ===== 보드 직렬화 =====
function serializeBoard(b) {
  return b.map(row => row.join('')).join('|');
}
function deserializeBoard(s) {
  if (!s) return Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
  return s.split('|').map(row => row.split('').map(Number));
}

// ===== 그리기 =====
function drawBoard() {
  ctx.fillStyle = '#E8C896';
  ctx.fillRect(0, 0, 600, 600);
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(CELL, CELL * (i + 1));
    ctx.lineTo(CELL * SIZE, CELL * (i + 1));
    ctx.moveTo(CELL * (i + 1), CELL);
    ctx.lineTo(CELL * (i + 1), CELL * SIZE);
    ctx.stroke();
  }
  [3, 7, 11].forEach(x => [3, 7, 11].forEach(y => {
    ctx.fillStyle = '#5a3a1a';
    ctx.beginPath();
    ctx.arc(CELL * (x + 1), CELL * (y + 1), 3, 0, Math.PI * 2);
    ctx.fill();
  }));
  forbiddenSpots.forEach(pos => {
    const [x, y] = pos.split(',').map(Number);
    const cx = CELL * (x + 1), cy = CELL * (y + 1);
    ctx.strokeStyle = '#d32f2f';
    ctx.lineWidth = 2.5;
    const r = CELL * 0.28;
    ctx.beginPath();
    ctx.moveTo(cx - r, cy - r); ctx.lineTo(cx + r, cy + r);
    ctx.moveTo(cx + r, cy - r); ctx.lineTo(cx - r, cy + r);
    ctx.stroke();
  });
  for (let x = 0; x < SIZE; x++) {
    for (let y = 0; y < SIZE; y++) {
      if (board[x][y]) drawStone(x, y, board[x][y]);
    }
  }
  // 승리 라인 하이라이트
  if (gameOver && winLine.length > 0) {
    winLine.forEach(([x, y]) => {
      const cx = CELL * (x + 1), cy = CELL * (y + 1);
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.48, 0, Math.PI * 2);
      ctx.stroke();
    });
    // 라인 그리기
    if (winLine.length >= 2) {
      const [x1, y1] = winLine[0];
      const [x2, y2] = winLine[winLine.length - 1];
      ctx.strokeStyle = 'rgba(255, 213, 79, 0.6)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(CELL * (x1 + 1), CELL * (y1 + 1));
      ctx.lineTo(CELL * (x2 + 1), CELL * (y2 + 1));
      ctx.stroke();
    }
  }
  if (turn === 2 && !gameOver) {
    const counts = {};
    Object.values(votes).forEach(pos => {
      counts[pos] = (counts[pos] || 0) + 1;
    });
    const maxCount = Math.max(0, ...Object.values(counts));
    Object.entries(counts).forEach(([pos, count]) => {
      const [x, y] = pos.split(',').map(Number);
      const cx = CELL * (x + 1), cy = CELL * (y + 1);
      const isLead = count === maxCount && maxCount > 0;
      ctx.fillStyle = isLead ? 'rgba(220, 50, 50, 0.55)' : 'rgba(50, 100, 220, 0.35)';
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.42, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(count, cx, cy);
    });
    if (!isHost && votes[myViewerId]) {
      const [x, y] = votes[myViewerId].split(',').map(Number);
      const cx = CELL * (x + 1), cy = CELL * (y + 1);
      ctx.strokeStyle = '#ffeb3b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.46, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}
function drawStone(x, y, color) {
  const cx = CELL * (x + 1), cy = CELL * (y + 1);
  ctx.beginPath();
  ctx.arc(cx, cy, CELL * 0.42, 0, Math.PI * 2);
  ctx.fillStyle = color === 1 ? '#1a1a1a' : '#f5f5f5';
  ctx.fill();
  ctx.strokeStyle = color === 1 ? '#000' : '#888';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function updateStatus() {
  if (gameOver) return;
  const s = document.getElementById('status');
  if (turn === 1) {
    s.textContent = '👑 호스트 차례 (흑돌)' + (renjuRule ? ' — 금수 표시됨' : '');
  } else {
    const left = Math.max(0, Math.ceil((voteDeadline - Date.now()) / 1000));
    s.textContent = '👥 시청자 투표 중 — ' + left + '초';
  }
}

// ===== 금수/승리 판정 =====
function countInDir(x, y, dx, dy, color) {
  let count = 0;
  for (let i = 1; i < 6; i++) {
    const nx = x + dx*i, ny = y + dy*i;
    if (nx<0||nx>=SIZE||ny<0||ny>=SIZE||board[nx][ny]!==color) break;
    count++;
  }
  return count;
}
function checkWin(x, y, color) {
  return !!checkWinWithLine(x, y, color);
}
// 승리 시 5목 좌표 배열 반환, 없으면 null
function checkWinWithLine(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dx, dy] of dirs) {
    const forward = countInDir(x, y, dx, dy, color);
    const backward = countInDir(x, y, -dx, -dy, color);
    const c = 1 + forward + backward;
    const wins = (renjuRule && color === 1) ? (c === 5) : (c >= 5);
    if (wins) {
      // 5목 좌표 모으기 (그 라인 전체)
      const line = [];
      for (let i = -backward; i <= forward; i++) {
        line.push([x + dx*i, y + dy*i]);
      }
      return line;
    }
  }
  return null;
}
function checkOverline(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dx, dy] of dirs) {
    const c = 1 + countInDir(x, y, dx, dy, color) + countInDir(x, y, -dx, -dy, color);
    if (c >= 6) return true;
  }
  return false;
}
function checkExactFive(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dx, dy] of dirs) {
    const c = 1 + countInDir(x, y, dx, dy, color) + countInDir(x, y, -dx, -dy, color);
    if (c === 5) return true;
  }
  return false;
}
function getLine(x, y, dx, dy, color) {
  const arr = [];
  for (let i = -5; i <= 5; i++) {
    const nx = x + dx*i, ny = y + dy*i;
    if (nx<0||nx>=SIZE||ny<0||ny>=SIZE) arr.push(-1);
    else if (i === 0) arr.push(color);
    else arr.push(board[nx][ny]);
  }
  return arr;
}
function countOpenThree(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let total = 0;
  for (const [dx, dy] of dirs) {
    const line = getLine(x, y, dx, dy, color);
    for (let start = 1; start <= 6; start++) {
      const w = line.slice(start, start + 5);
      if (w.length < 5) break;
      const cc = w.filter(v => v === color).length;
      const ee = w.filter(v => v === 0).length;
      if (cc === 3 && ee === 2 && w[0] === 0 && w[4] === 0) {
        if (start <= 5 && start + 5 > 5) { total++; break; }
      }
    }
  }
  return total;
}
function countFours(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let total = 0;
  for (const [dx, dy] of dirs) {
    const line = getLine(x, y, dx, dy, color);
    let found = false;
    for (let start = 1; start <= 6; start++) {
      const w = line.slice(start, start + 5);
      if (w.length < 5) break;
      const cc = w.filter(v => v === color).length;
      const ee = w.filter(v => v === 0).length;
      if (cc === 4 && ee === 1) {
        if (start <= 5 && start + 5 > 5) { found = true; break; }
      }
    }
    if (found) total++;
  }
  return total;
}
function isForbidden(x, y) {
  if (board[x][y] !== 0) return false;
  board[x][y] = 1;
  let forbidden = false;
  if (checkExactFive(x, y, 1)) {
    forbidden = false;
  } else if (checkOverline(x, y, 1)) {
    forbidden = true;
  } else {
    const threes = countOpenThree(x, y, 1);
    const fours = countFours(x, y, 1);
    if (threes >= 2 || fours >= 2) forbidden = true;
  }
  board[x][y] = 0;
  return forbidden;
}
function computeForbidden() {
  forbiddenSpots = [];
  if (!renjuRule || turn !== 1 || gameOver) return;
  for (let x = 0; x < SIZE; x++) {
    for (let y = 0; y < SIZE; y++) {
      if (board[x][y] === 0 && isForbidden(x, y)) {
        forbiddenSpots.push(x + ',' + y);
      }
    }
  }
}

drawBoard();
</script>
