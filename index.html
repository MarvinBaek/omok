<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>스트리머 오목 - 시청자 투표 대전</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #1a1a1a;
    color: #f0f0f0;
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 12px; }
  .panel {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  .panel-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  button {
    background: #444;
    color: #f0f0f0;
    border: 1px solid #555;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover { background: #555; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #c84a3a; border-color: #c84a3a; }
  button.primary:hover { background: #d85a4a; }
  input[type="text"] {
    background: #1a1a1a;
    color: #f0f0f0;
    border: 1px solid #555;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
  }
  code {
    background: #1a1a1a;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    word-break: break-all;
  }
  canvas {
    width: 100%;
    height: auto;
    background: #E8C896;
    border-radius: 8px;
    cursor: pointer;
    display: block;
  }
  .muted { color: #999; font-size: 13px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .row > * { flex: 1; min-width: 80px; }
  details summary { cursor: pointer; font-weight: 500; font-size: 14px; padding: 4px 0; }
  details > div { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  label { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  input[type="range"] { flex: 1; }
  .hidden { display: none !important; }
  #status { font-size: 14px; }
  #result-msg { text-align: center; min-height: 20px; color: #ffd54f; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 스트리머 오목 — 시청자 투표 대전</h1>

  <!-- 로비 -->
  <div id="lobby" class="panel">
    <p class="muted" id="lobby-status">Firebase 연결 중...</p>
    <div class="row">
      <button id="btn-host" class="primary" disabled>방 만들기 (호스트)</button>
      <button id="btn-join-toggle" disabled>방 참여 (시청자)</button>
    </div>
    <div id="join-area" class="hidden">
      <input id="room-input" type="text" placeholder="방 ID 입력 (예: abc123)" />
      <div style="height: 8px"></div>
      <button id="btn-join" style="width: 100%">접속</button>
    </div>
  </div>

  <!-- 게임 영역 -->
  <div id="game-area" class="hidden">
    <details class="panel" id="settings-panel">
      <summary>⚙️ 설정 (호스트 전용)</summary>
      <div>
        <label>
          <span style="min-width: 80px;">투표 시간</span>
          <input id="time-slider" type="range" min="5" max="60" value="20" />
          <span id="time-val" style="min-width: 40px; text-align: right;">20초</span>
        </label>
        <label>
          <input id="rule-toggle" type="checkbox" />
          <span>금수 룰 (3-3, 4-4, 장목 금지)</span>
        </label>
        <button id="btn-reset" style="margin-top: 4px;">새 게임 시작</button>
      </div>
    </details>

    <div class="panel panel-row">
      <span id="role-label" style="font-weight: 500;"></span>
      <span id="status">대기 중</span>
    </div>

    <!-- 호스트용 방 ID 표시 (게임 화면 안) -->
    <div id="room-id-display" class="panel hidden" style="background: #3a2a1a; border: 1px solid #c84a3a;">
      <p class="muted" style="margin: 0 0 6px; color: #ffb;">📢 시청자에게 공유할 방 ID:</p>
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
        <code id="my-room-id" style="flex: 1; font-size: 18px; font-weight: bold; color: #ffd54f;"></code>
        <button id="btn-copy" style="padding: 6px 12px; font-size: 12px;">ID 복사</button>
      </div>
      <p class="muted" style="margin: 0; font-size: 12px;">또는 링크 공유:</p>
      <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
        <code id="share-link" style="flex: 1; font-size: 11px;"></code>
        <button id="btn-copy-link" style="padding: 6px 12px; font-size: 12px;">링크 복사</button>
      </div>
    </div>

    <canvas id="board" width="600" height="600"></canvas>

    <div class="panel" id="info-panel" style="margin-top: 8px;">
      <div class="panel-row">
        <span class="muted">접속자: <span id="viewer-count">0</span>명</span>
        <span class="muted" id="my-vote-info"></span>
      </div>
    </div>
    <p id="result-msg"></p>
  </div>
</div>

<!-- Firebase SDK (compat 버전 - 간단하게 쓰기 좋음) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// ===== Firebase 설정 (사용자의 키) =====
const firebaseConfig = {
  apiKey: "AIzaSyCl1KMqk_FCWjld_Q1e5zRmaTeNg7Wezms",
  authDomain: "omok-stream.firebaseapp.com",
  databaseURL: "https://omok-stream-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "omok-stream",
  storageBucket: "omok-stream.firebasestorage.app",
  messagingSenderId: "472668336748",
  appId: "1:472668336748:web:85a40f7226f93db541de49"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== 게임 상수 =====
const SIZE = 15;
const CELL = 600 / (SIZE + 1);
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// ===== 상태 =====
let roomId = null;
let isHost = false;
let myViewerId = 'v_' + Math.random().toString(36).slice(2, 8);
let roomRef = null;
let board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
let turn = 1;
let gameOver = false;
let votes = {};
let voteTime = 20;
let renjuRule = false;
let voteDeadline = null;
let localTimer = null;
let forbiddenSpots = [];
let presenceRef = null;
let viewerCount = 0;

// ===== Firebase 연결 확인 =====
db.ref('.info/connected').on('value', (snap) => {
  const connected = snap.val();
  const lobbyStatus = document.getElementById('lobby-status');
  if (connected) {
    lobbyStatus.textContent = '✅ Firebase 연결됨 — 방을 만들거나 입장하세요';
    document.getElementById('btn-host').disabled = false;
    document.getElementById('btn-join-toggle').disabled = false;
  } else {
    lobbyStatus.textContent = '⏳ Firebase 연결 중...';
  }
});

// ===== UI 핸들러 =====
document.getElementById('btn-host').addEventListener('click', createRoom);
document.getElementById('btn-join-toggle').addEventListener('click', () => {
  document.getElementById('join-area').classList.toggle('hidden');
});
document.getElementById('btn-join').addEventListener('click', () => {
  const id = document.getElementById('room-input').value.trim().toLowerCase();
  if (id) joinRoom(id);
});
document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(roomId);
  const b = document.getElementById('btn-copy');
  b.textContent = '복사됨!';
  setTimeout(() => b.textContent = 'ID 복사', 1500);
});
document.getElementById('btn-copy-link').addEventListener('click', () => {
  const link = window.location.origin + window.location.pathname + '?room=' + roomId;
  navigator.clipboard.writeText(link);
  const b = document.getElementById('btn-copy-link');
  b.textContent = '복사됨!';
  setTimeout(() => b.textContent = '링크 복사', 1500);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!isHost) return;
  resetGame();
});
document.getElementById('time-slider').addEventListener('input', (e) => {
  voteTime = parseInt(e.target.value);
  document.getElementById('time-val').textContent = voteTime + '초';
  if (isHost) roomRef.child('meta/voteTime').set(voteTime);
});
document.getElementById('rule-toggle').addEventListener('change', (e) => {
  renjuRule = e.target.checked;
  if (isHost) roomRef.child('meta/renju').set(renjuRule);
  computeForbidden();
  drawBoard();
});

// URL에서 방 ID 자동 인식
const urlParams = new URLSearchParams(window.location.search);
const urlRoom = urlParams.get('room');
if (urlRoom) {
  document.getElementById('btn-join-toggle').addEventListener('click', () => {}, { once: true });
  setTimeout(() => {
    if (!roomId) {
      document.getElementById('room-input').value = urlRoom;
      document.getElementById('join-area').classList.remove('hidden');
    }
  }, 500);
}

// ===== 방 생성 =====
function createRoom() {
  roomId = Math.random().toString(36).slice(2, 8);
  isHost = true;
  roomRef = db.ref('rooms/' + roomId);
  console.log('[방 만들기] 시도 - 방 ID:', roomId);
  // 초기 상태 작성
  roomRef.set({
    board: serializeBoard(board),
    turn: 1,
    votes: {},
    meta: {
      voteTime: voteTime,
      renju: renjuRule,
      gameOver: false,
      voteDeadline: 0,
      winner: 0
    }
  }).then(() => {
    console.log('[방 만들기] 성공!');
    enterGame();
  }).catch(err => {
    console.error('[방 만들기] 실패:', err);
    alert('❌ 방 생성 실패\n\n사유: ' + err.message + '\n\n해결방법: Firebase 콘솔에서 Realtime Database → 규칙 탭을 확인하세요.');
  });
}

// ===== 방 입장 =====
function joinRoom(id) {
  roomId = id;
  isHost = false;
  roomRef = db.ref('rooms/' + roomId);
  roomRef.once('value').then(snap => {
    if (!snap.exists()) {
      alert('해당 방이 존재하지 않습니다: ' + id);
      return;
    }
    enterGame();
  });
}

// ===== 게임 화면 진입 =====
function enterGame() {
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('role-label').textContent = isHost ? '👑 호스트 (흑돌)' : '👥 시청자 (백돌 투표)';

  if (isHost) {
    document.getElementById('room-id-display').classList.remove('hidden');
    document.getElementById('my-room-id').textContent = roomId;
    const link = window.location.origin + window.location.pathname + '?room=' + roomId;
    document.getElementById('share-link').textContent = link;
  } else {
    document.getElementById('settings-panel').classList.add('hidden');
  }

  // Firebase 리스너
  roomRef.on('value', onRoomUpdate);

  // 접속자 카운트 (presence)
  presenceRef = roomRef.child('presence/' + myViewerId);
  presenceRef.set(true);
  presenceRef.onDisconnect().remove();
  roomRef.child('presence').on('value', (snap) => {
    viewerCount = snap.numChildren();
    document.getElementById('viewer-count').textContent = viewerCount;
  });

  drawBoard();
}

// ===== Firebase 상태 변경 수신 =====
function onRoomUpdate(snap) {
  const data = snap.val();
  if (!data) return;
  board = deserializeBoard(data.board);
  turn = data.turn || 1;
  votes = data.votes || {};
  const meta = data.meta || {};
  gameOver = !!meta.gameOver;
  voteTime = meta.voteTime || 20;
  renjuRule = !!meta.renju;
  voteDeadline = meta.voteDeadline || 0;

  // 호스트 설정 UI 동기화
  if (isHost) {
    document.getElementById('time-slider').value = voteTime;
    document.getElementById('time-val').textContent = voteTime + '초';
    document.getElementById('rule-toggle').checked = renjuRule;
  }

  computeForbidden();
  updateStatus();
  drawBoard();

  // 투표 타이머 (호스트만 결과를 결정)
  if (turn === 2 && !gameOver && voteDeadline > 0) {
    startLocalTimer();
  } else {
    stopLocalTimer();
  }

  // 게임 종료 표시
  if (gameOver && meta.winner) {
    document.getElementById('status').textContent =
      (meta.winner === 1 ? '👑 호스트 승리!' : '👥 시청자 승리!');
  }
}

// ===== 시청자가 클릭 → 투표 =====
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scale = 600 / rect.width;
  const px = (e.clientX - rect.left) * scale;
  const py = (e.clientY - rect.top) * scale;
  const x = Math.round(px / CELL) - 1;
  const y = Math.round(py / CELL) - 1;
  if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
  if (board[x][y] !== 0) return;

  if (isHost) {
    if (turn !== 1) return;
    if (renjuRule && isForbidden(x, y)) {
      document.getElementById('result-msg').textContent = '⛔ 금수 자리입니다';
      return;
    }
    hostPlaceStone(x, y, 1);
  } else {
    if (turn !== 2) return;
    // 투표
    roomRef.child('votes/' + myViewerId).set(x + ',' + y);
    document.getElementById('my-vote-info').textContent = '내 투표: (' + x + ',' + y + ')';
  }
});

// ===== 호스트: 돌 두기 =====
function hostPlaceStone(x, y, color) {
  board[x][y] = color;
  const win = checkWin(x, y, color);
  const updates = {
    board: serializeBoard(board),
    turn: color === 1 ? 2 : 1,
    votes: {}
  };
  if (win) {
    updates['meta/gameOver'] = true;
    updates['meta/winner'] = color;
  } else if (updates.turn === 2) {
    // 시청자 투표 시작 → 마감시간 기록
    updates['meta/voteDeadline'] = Date.now() + voteTime * 1000;
  }
  roomRef.update(updates);
}

// ===== 호스트: 투표 결과 처리 =====
function resolveVote() {
  if (!isHost || turn !== 2 || gameOver) return;
  roomRef.child('votes').once('value').then(snap => {
    const v = snap.val() || {};
    const counts = {};
    Object.values(v).forEach(pos => {
      counts[pos] = (counts[pos] || 0) + 1;
    });
    const entries = Object.entries(counts);
    if (entries.length === 0) {
      // 투표 없음 → 차례 넘김
      roomRef.update({
        turn: 1,
        votes: {},
        'meta/voteDeadline': 0
      });
      document.getElementById('result-msg').textContent = '투표 없음 — 호스트 차례로 넘어갑니다';
      return;
    }
    const max = Math.max(...entries.map(e => e[1]));
    const winners = entries.filter(e => e[1] === max);
    const winner = winners[Math.floor(Math.random() * winners.length)];
    const [x, y] = winner[0].split(',').map(Number);
    document.getElementById('result-msg').textContent =
      `(${x},${y})에 ${max}표 — 백돌 착수${winners.length > 1 ? ` (동률 ${winners.length}개 중 랜덤)` : ''}`;
    hostPlaceStone(x, y, 2);
  });
}

// ===== 로컬 타이머 =====
function startLocalTimer() {
  stopLocalTimer();
  localTimer = setInterval(() => {
    const left = Math.max(0, Math.ceil((voteDeadline - Date.now()) / 1000));
    document.getElementById('status').textContent = '👥 시청자 투표 중 — ' + left + '초';
    if (left <= 0) {
      stopLocalTimer();
      if (isHost) resolveVote();
    }
  }, 200);
}
function stopLocalTimer() {
  if (localTimer) { clearInterval(localTimer); localTimer = null; }
}

// ===== 새 게임 =====
function resetGame() {
  board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
  roomRef.update({
    board: serializeBoard(board),
    turn: 1,
    votes: {},
    'meta/gameOver': false,
    'meta/winner': 0,
    'meta/voteDeadline': 0
  });
  document.getElementById('result-msg').textContent = '새 게임 시작!';
}

// ===== 보드 직렬화 =====
function serializeBoard(b) {
  return b.map(row => row.join('')).join('|');
}
function deserializeBoard(s) {
  if (!s) return Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
  return s.split('|').map(row => row.split('').map(Number));
}

// ===== 그리기 =====
function drawBoard() {
  ctx.fillStyle = '#E8C896';
  ctx.fillRect(0, 0, 600, 600);
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(CELL, CELL * (i + 1));
    ctx.lineTo(CELL * SIZE, CELL * (i + 1));
    ctx.moveTo(CELL * (i + 1), CELL);
    ctx.lineTo(CELL * (i + 1), CELL * SIZE);
    ctx.stroke();
  }
  [3, 7, 11].forEach(x => [3, 7, 11].forEach(y => {
    ctx.fillStyle = '#5a3a1a';
    ctx.beginPath();
    ctx.arc(CELL * (x + 1), CELL * (y + 1), 3, 0, Math.PI * 2);
    ctx.fill();
  }));
  forbiddenSpots.forEach(pos => {
    const [x, y] = pos.split(',').map(Number);
    const cx = CELL * (x + 1), cy = CELL * (y + 1);
    ctx.strokeStyle = '#d32f2f';
    ctx.lineWidth = 2.5;
    const r = CELL * 0.28;
    ctx.beginPath();
    ctx.moveTo(cx - r, cy - r); ctx.lineTo(cx + r, cy + r);
    ctx.moveTo(cx + r, cy - r); ctx.lineTo(cx - r, cy + r);
    ctx.stroke();
  });
  for (let x = 0; x < SIZE; x++) {
    for (let y = 0; y < SIZE; y++) {
      if (board[x][y]) drawStone(x, y, board[x][y]);
    }
  }
  if (turn === 2 && !gameOver) {
    const counts = {};
    Object.values(votes).forEach(pos => {
      counts[pos] = (counts[pos] || 0) + 1;
    });
    const maxCount = Math.max(0, ...Object.values(counts));
    Object.entries(counts).forEach(([pos, count]) => {
      const [x, y] = pos.split(',').map(Number);
      const cx = CELL * (x + 1), cy = CELL * (y + 1);
      const isLead = count === maxCount && maxCount > 0;
      ctx.fillStyle = isLead ? 'rgba(220, 50, 50, 0.55)' : 'rgba(50, 100, 220, 0.35)';
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.42, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(count, cx, cy);
    });
    if (!isHost && votes[myViewerId]) {
      const [x, y] = votes[myViewerId].split(',').map(Number);
      const cx = CELL * (x + 1), cy = CELL * (y + 1);
      ctx.strokeStyle = '#ffeb3b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.46, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}
function drawStone(x, y, color) {
  const cx = CELL * (x + 1), cy = CELL * (y + 1);
  ctx.beginPath();
  ctx.arc(cx, cy, CELL * 0.42, 0, Math.PI * 2);
  ctx.fillStyle = color === 1 ? '#1a1a1a' : '#f5f5f5';
  ctx.fill();
  ctx.strokeStyle = color === 1 ? '#000' : '#888';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function updateStatus() {
  if (gameOver) return;
  const s = document.getElementById('status');
  if (turn === 1) {
    s.textContent = '👑 호스트 차례 (흑돌)' + (renjuRule ? ' — 금수 표시됨' : '');
  } else {
    const left = Math.max(0, Math.ceil((voteDeadline - Date.now()) / 1000));
    s.textContent = '👥 시청자 투표 중 — ' + left + '초';
  }
}

// ===== 금수/승리 판정 =====
function countInDir(x, y, dx, dy, color) {
  let count = 0;
  for (let i = 1; i < 6; i++) {
    const nx = x + dx*i, ny = y + dy*i;
    if (nx<0||nx>=SIZE||ny<0||ny>=SIZE||board[nx][ny]!==color) break;
    count++;
  }
  return count;
}
function checkWin(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dx, dy] of dirs) {
    const c = 1 + countInDir(x, y, dx, dy, color) + countInDir(x, y, -dx, -dy, color);
    if (renjuRule && color === 1) {
      if (c === 5) return true;
    } else {
      if (c >= 5) return true;
    }
  }
  return false;
}
function checkOverline(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dx, dy] of dirs) {
    const c = 1 + countInDir(x, y, dx, dy, color) + countInDir(x, y, -dx, -dy, color);
    if (c >= 6) return true;
  }
  return false;
}
function checkExactFive(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (const [dx, dy] of dirs) {
    const c = 1 + countInDir(x, y, dx, dy, color) + countInDir(x, y, -dx, -dy, color);
    if (c === 5) return true;
  }
  return false;
}
function getLine(x, y, dx, dy, color) {
  const arr = [];
  for (let i = -5; i <= 5; i++) {
    const nx = x + dx*i, ny = y + dy*i;
    if (nx<0||nx>=SIZE||ny<0||ny>=SIZE) arr.push(-1);
    else if (i === 0) arr.push(color);
    else arr.push(board[nx][ny]);
  }
  return arr;
}
function countOpenThree(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let total = 0;
  for (const [dx, dy] of dirs) {
    const line = getLine(x, y, dx, dy, color);
    for (let start = 1; start <= 6; start++) {
      const w = line.slice(start, start + 5);
      if (w.length < 5) break;
      const cc = w.filter(v => v === color).length;
      const ee = w.filter(v => v === 0).length;
      if (cc === 3 && ee === 2 && w[0] === 0 && w[4] === 0) {
        if (start <= 5 && start + 5 > 5) { total++; break; }
      }
    }
  }
  return total;
}
function countFours(x, y, color) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let total = 0;
  for (const [dx, dy] of dirs) {
    const line = getLine(x, y, dx, dy, color);
    let found = false;
    for (let start = 1; start <= 6; start++) {
      const w = line.slice(start, start + 5);
      if (w.length < 5) break;
      const cc = w.filter(v => v === color).length;
      const ee = w.filter(v => v === 0).length;
      if (cc === 4 && ee === 1) {
        if (start <= 5 && start + 5 > 5) { found = true; break; }
      }
    }
    if (found) total++;
  }
  return total;
}
function isForbidden(x, y) {
  if (board[x][y] !== 0) return false;
  board[x][y] = 1;
  let forbidden = false;
  if (checkExactFive(x, y, 1)) {
    forbidden = false;
  } else if (checkOverline(x, y, 1)) {
    forbidden = true;
  } else {
    const threes = countOpenThree(x, y, 1);
    const fours = countFours(x, y, 1);
    if (threes >= 2 || fours >= 2) forbidden = true;
  }
  board[x][y] = 0;
  return forbidden;
}
function computeForbidden() {
  forbiddenSpots = [];
  if (!renjuRule || turn !== 1 || gameOver) return;
  for (let x = 0; x < SIZE; x++) {
    for (let y = 0; y < SIZE; y++) {
      if (board[x][y] === 0 && isForbidden(x, y)) {
        forbiddenSpots.push(x + ',' + y);
      }
    }
  }
}

drawBoard();
